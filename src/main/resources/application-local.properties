# Database
spring.datasource.url=jdbc:h2:mem:recipedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Schema and sample data (reuses Flyway migration files)
spring.sql.init.schema-locations=classpath:db/migration/V1__initial_schema.sql
spring.sql.init.data-locations=classpath:db/migration/data.sql
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.com.abnamro.recipes=DEBUG
logging.level.org.springframework.web=DEBUG
