# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# HikariCP connection pool
# maximum-pool-size: max concurrent DB connections (default 10). Tune to DB server capacity.
# minimum-idle: connections kept alive when idle (default = maximum-pool-size, i.e. fixed pool).
# connection-timeout: ms to wait for a connection before throwing (default 30000).
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Logging
logging.level.com.abnamro.recipes=WARN
logging.level.org.springframework.web=WARN