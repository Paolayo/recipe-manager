spring.application.name=recipe-manager

# JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 console — off by default, enabled in dev
spring.h2.console.enabled=false

# Flyway — off by default, enabled in prod
spring.flyway.enabled=false

# API contact info (overridable via APP_CONTACT_NAME / APP_CONTACT_EMAIL env vars)
app.contact.name=${APP_CONTACT_NAME:Paola}
app.contact.email=${APP_CONTACT_EMAIL:paola.baiges@gmail.com}

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# Virtual threads (Java 21 / Project Loom)
spring.threads.virtual.enabled=true

# Logging
logging.level.com.abnamro.recipes=INFO
logging.level.org.springframework.web=INFO